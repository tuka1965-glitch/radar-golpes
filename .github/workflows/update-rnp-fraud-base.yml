name: Update RNP fraud base

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rnp-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build compact RNP fraud base
        run: python tools/build_rnp_fraud_base.py --limit 500 --max-pages 80 --delay 0.25 --insecure-tls

      - name: Validate JSON
        run: python -m json.tool data/fraudes-rnp.json > /tmp/fraudes-rnp.pretty.json

      - name: Commit updated base
        run: |
          if git diff --quiet -- data/fraudes-rnp.json; then
            echo "No RNP fraud base changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fraudes-rnp.json
          git commit -m "Update RNP fraud base"
          git push
